spring:
  # 不是本地部署的Redis或者修改端口的记得修改Redis配置
  data:
    mongodb:
      # 如果没有密码
      # uri: mongodb://localhost:27017/MaaBackend
      # 有密码
      # uri: mongodb://用户名:密码@localhost:27017/MaaBackend
      uri: mongodb://127.0.0.1/MaaBackend
    redis:
      port: 6379
      host: 127.0.0.1

maa-copilot:
  backup:
    dir: /home/dove/copilotBak
    uri: git@github.com:dragove/zoot-copilot-store.git
    disabled: true
    username: dragove
    email: dragove@qq.com
  info:
    title: ZOOT Plus Backend API
    description: ZOOT Plus Backend API
    version: v2.0.0
    domain: https://maa-backend-dev.maayuan.fun:16666
    frontend-domain: https://share.maayuan.fun:16666/
  jwt:
    header: Authorization
    # 默认的JwtToken过期时间，以秒为单位
    expire: 21600
    # JwtToken的加密密钥
    secret: $I_Am_The_Bone_Of_My_Sword!Steel_Is_My_Body_And_Fire_Is_My_Blood!$
  github:
    # GitHub api token
    token: github_pat_xxx
  vcode:
    #默认的验证码失效时间,以秒为单位
    expire: 600
  register:
    # 是否启用“注册码注册”模式（启用后将不再校验邮箱验证码）
    useRegistrationCode: false
    # 注册码（当启用注册码注册时，注册必须提供并与此值完全匹配）
    registrationCode: ""
  cache:
    default-expire: 60
  task-cron:
    ark-level: "-"
    copilot-update: "-"
  levels:
    # 启用从 GitHub contents 拉取 v2 JSON（否则使用 classpath）
    enable-github: false
    # GitHub api token，匿名会受限速约 60 次/小时
    token: github_pat_xxx
    # 目标 repo 路径，形如 组织/仓库/分支
    repo-and-branch: MaaAssistantArknights/MaaAssistantArknights/dev
    # JSON 所在目录（相对于分支路径）
    json-dir: resource/levels
    # JSON 文件名
    json-file: arknights-levels.v2.json
    # 本地缓存文件路径
    local-cache: ./data/levels/arknights-levels.v2.json
  mail:
    # 邮件通知
    notification: true
  mails:
    # 邮件服务器的SMTP地址
    - host: smtp.163.com
      # 邮件服务器的SMTP的端口 (qq为465,网易为25)
      port: 25
      # 发件人（必须正确，否则发送失败）
      from: user@163.com
      # 用户名(foxmail和qq为发件人邮箱前缀，阿里云邮箱和网易的user是邮箱的完整地址)
      user: user@163.com
      # 密码(拿到的授权码)
      pass: wysqm
      starttls: true
      ssl: false
    - host: smtp.qq.com
      # 使用 ssl 的情况，使用STARTTLS时应该为587（未测试）
      port: 465
      from: user@qq.com
      user: user
      # QQ邮箱的授权码
      pass: qqsqm
      ssl: true
      starttls: false
  copilot:
    min-value-show-not-enough-rating: 50
  sensitive-word:
    path: "classpath:sensitive-word.txt"


springdoc:
  swagger-ui:
    # 开启Swagger UI界面
    enabled: true
  api-docs:
    # 开启api-docs
    enabled: true
  # 配置需要生成接口文档的扫描包
  packages-to-scan: plus.maa.backend
