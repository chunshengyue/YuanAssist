name: Update Levels Data

on:
  # 保留原有的定时任务
  schedule:
    - cron: "0 0 * * 0" # 每周日 UTC 00:00 运行
  
  # 保留原有的手动触发
  workflow_dispatch:
  
  # ✅ 新增：接收外部 Webhook 信号
  repository_dispatch:
    types: [feishu_content_update]  # 这里必须和你 Node.js 代码里的 event_type 一致

jobs:
  sync-levels:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # (可选) 增加一个步骤打印触发来源，方便调试
      - name: Log Trigger Source
        run: |
          echo "Workflow triggered by: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "Payload timestamp: ${{ github.event.client_payload.timestamp }}"
            echo "Source: ${{ github.event.client_payload.source }}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pypinyin

      - name: Sync levels data
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_ID: ${{ secrets.FEISHU_BITABLE_ID }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_OPERATORS_TABLE_ID: ${{ secrets.FEISHU_OPERATORS_TABLE_ID }}
        run: python tools/sync_levels.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # ✅ 修改点：使用脚本实际生成的准确路径
          git add resource/levels.json || true
          
          # 提交变更
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update level data [skip ci]" && git push)

